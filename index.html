<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anthea Mathekga | Portfolio</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
  body { background: #f4f4f4; color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }

  header { background: #6a0dad; color: white; text-align: center; padding: 20px; }
  header h1 { font-size: 28px; }

  .contact-card {
    display: flex; align-items: center; gap: 20px; padding: 25px;
    background: white; border-radius: 15px; max-width: 700px;
    margin: 30px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  .headshot {
    width: 130px; height: 130px; border-radius: 50%;
    object-fit: cover; border: 4px solid #6a0dad; flex-shrink: 0;
  }
  .contact-info h3 { font-size: 22px; color: #6a0dad; }
  .contact-info p { margin: 5px 0; }

  .container { max-width: 700px; margin: 0 auto; padding: 0 20px; }
  .toggle-btn {
    background: #6a0dad; color: white; border: none; padding: 12px 20px;
    margin: 8px 5px; border-radius: 8px; cursor: pointer; font-size: 16px;
    transition: 0.3s;
  }
  .toggle-btn:hover { background: #520a8a; }
  .content {
    background: white; padding: 20px; margin: 10px 0 20px 0;
    border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    display: none; /* hidden by default */
  }
  .content.active { display: block; } /* this makes it show */

  .weather { background: white; padding: 20px; margin: 20px auto; border-radius: 10px; max-width: 700px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

  footer { background: #6a0dad; color: white; text-align: center; padding: 20px 10px; margin-top: auto; font-size: 14px; }
