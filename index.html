<script>
    // TAB SWITCHING
    function showTab(evt, tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    // WEATHER + LOCATION FOR THE PERSON OPENING THE SITE
    async function fetchWeather() {
        const locationEl = document.getElementById('location');
        const descEl = document.getElementById('weather-desc');
        const tempEl = document.getElementById('temperature');

        if (!navigator.geolocation) {
            locationEl.innerText = "📍 Location not supported";
            descEl.innerText = "Please use a modern browser";
            return;
        }

        navigator.geolocation.getCurrentPosition(async (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            try {
                // 1. GET WEATHER FROM COORDINATES
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`);
                const weatherData = await weatherRes.json();
                const temp = weatherData.current_weather.temperature;
                const code = weatherData.current_weather.weathercode;

                let description = "Clear";
                if (code === 0) description = "Clear Sky ☀️";
                else if (code <= 3) description = "Partly Cloudy ⛅";
                else if (code <= 48) description = "Foggy 🌫️";
                else if (code <= 67) description = "Rainy 🌧️";
                else if (code <= 77) description = "Snowy ❄️";
                else if (code <= 82) description = "Showers 🌦️";
                else if (code >= 95) description = "Thunderstorm ⛈️";

                // 2. GET CITY NAME FROM COORDINATES using free reverse geocoding
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const geoData = await geoRes.json();
                const city = geoData.address.city || geoData.address.town || geoData.address.village || "Your Area";
                const country = geoData.address.country || "";

                locationEl.innerText = `📍 ${city}, ${country}`;
                descEl.innerText = description;
                tempEl.innerText = `${temp}°C`;

            } catch (error) {
                console.log(error);
                locationEl.innerText = "📍 Location Found";
                descEl.innerText = "Weather data unavailable";
                tempEl.innerText = "--°C";
            }

        }, (error) => {
            // If user clicks "Block"
            locationEl.innerText = "📍 Location Access Denied";
            descEl.innerText = "Please allow location to see local weather";
            tempEl.innerText = "--°C";
        });
    }
    
    window.addEventListener('load', fetchWeather);
            </script>
